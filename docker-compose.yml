version: '3.8'

services:
  influxdb:
    image: influxdb:2.7-alpine
    container_name: woodox-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=woodox2024
      - DOCKER_INFLUXDB_INIT_ORG=wood-ox-research
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor_raw
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=woodox-secret-token-2024
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./influxdb/scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: woodox-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  modbus-receiver:
    build: ./backend
    container_name: woodox-modbus-receiver
    working_dir: /app
    command: python -m microservices.modbus_receiver
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=woodox-secret-token-2024
      - INFLUXDB_ORG=wood-ox-research
      - INFLUXDB_BUCKET=sensor_raw
      - REDIS_URL=redis://redis:6379/0
      - CONFIG_DIR=/app/config
      - APP_ENV=production
    depends_on:
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./config:/app/config
    restart: unless-stopped
    profiles:
      - distributed

  walking-simulator:
    build: ./backend
    container_name: woodox-walking-simulator
    working_dir: /app
    command: python -m microservices.walking_simulator
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=woodox-secret-token-2024
      - INFLUXDB_ORG=wood-ox-research
      - INFLUXDB_BUCKET=sensor_raw
      - REDIS_URL=redis://redis:6379/0
      - CONFIG_DIR=/app/config
      - APP_ENV=production
    depends_on:
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./config:/app/config
    restart: unless-stopped
    profiles:
      - distributed

  obstacle-analyzer:
    build: ./backend
    container_name: woodox-obstacle-analyzer
    working_dir: /app
    command: python -m microservices.obstacle_analyzer
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=woodox-secret-token-2024
      - INFLUXDB_ORG=wood-ox-research
      - INFLUXDB_BUCKET=sensor_raw
      - REDIS_URL=redis://redis:6379/0
      - CONFIG_DIR=/app/config
      - APP_ENV=production
    depends_on:
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./config:/app/config
    restart: unless-stopped
    profiles:
      - distributed

  alarm-ws:
    build: ./backend
    container_name: woodox-alarm-ws
    working_dir: /app
    command: python -m microservices.alarm_ws
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=woodox-secret-token-2024
      - INFLUXDB_ORG=wood-ox-research
      - INFLUXDB_BUCKET=sensor_raw
      - REDIS_URL=redis://redis:6379/0
      - CONFIG_DIR=/app/config
      - APP_ENV=production
    depends_on:
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./config:/app/config
    restart: unless-stopped
    profiles:
      - distributed

  backend:
    build: ./backend
    container_name: woodox-backend
    working_dir: /app
    command: python main.py
    ports:
      - "8000:8000"
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=woodox-secret-token-2024
      - INFLUXDB_ORG=wood-ox-research
      - INFLUXDB_BUCKET=sensor_raw
      - REDIS_URL=redis://redis:6379/0
      - CONFIG_DIR=/app/config
      - APP_ENV=production
    depends_on:
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./config:/app/config
    restart: unless-stopped

  frontend:
    image: node:18-alpine
    container_name: woodox-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    restart: unless-stopped
    profiles:
      - frontend

volumes:
  influxdb-data:
  redis-data:
